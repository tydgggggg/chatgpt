name: TurboLink Setup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"

      - name: Create Flutter Project
        run: |
          flutter create .

      - name: Create Project Structure
        run: |
          mkdir -p lib/core/theme
          mkdir -p lib/core/constants
          mkdir -p lib/core/utils

          mkdir -p lib/screens/splash
          mkdir -p lib/screens/home
          mkdir -p lib/screens/send
          mkdir -p lib/screens/receive
          mkdir -p lib/screens/discovery
          mkdir -p lib/screens/transfer

          mkdir -p lib/widgets

          mkdir -p lib/services/wifi
          mkdir -p lib/services/transfer
          mkdir -p lib/services/qr

          mkdir -p lib/providers

      - name: Add Dependencies
        run: |
          sed -i '/dependencies:/a\
            flutter_riverpod: ^2.5.1\
            file_picker: ^8.0.0\
            mobile_scanner: ^5.1.1\
            permission_handler: ^11.3.1\
            network_info_plus: ^5.0.3\
            google_fonts: ^6.2.1' pubspec.yaml

      - name: Create main.dart
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';

          void main() {
            runApp(const TurboLinkApp());
          }

          class TurboLinkApp extends StatelessWidget {
            const TurboLinkApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'TurboLink',
                theme: ThemeData(
                  brightness: Brightness.dark,
                  scaffoldBackgroundColor: const Color(0xFF0A0A0A),
                  colorScheme: const ColorScheme.dark(
                    primary: Color(0xFF00D1FF),
                    secondary: Color(0xFFB026FF),
                  ),
                ),
                home: const HomeScreen(),
              );
            }
          }

          class HomeScreen extends StatelessWidget {
            const HomeScreen({super.key});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: Padding(
                    padding: const EdgeInsets.all(24),
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        const SizedBox(height: 20),

                        const Text(
                          'TURBOLINK',
                          style: TextStyle(
                            fontSize: 34,
                            fontWeight: FontWeight.bold,
                            color: Color(0xFF00D1FF),
                          ),
                        ),

                        const SizedBox(height: 8),

                        const Text(
                          'Fast File Sharing',
                          style: TextStyle(
                            color: Colors.white54,
                            fontSize: 16,
                          ),
                        ),

                        const SizedBox(height: 40),

                        Expanded(
                          child: GridView.count(
                            crossAxisCount: 2,
                            crossAxisSpacing: 16,
                            mainAxisSpacing: 16,
                            children: [
                              buildCard(
                                '⚡ SEND',
                                const Color(0xFF00D1FF),
                              ),
                              buildCard(
                                '📥 RECEIVE',
                                const Color(0xFFB026FF),
                              ),
                            ],
                          ),
                        ),

                        const SizedBox(height: 20),

                        Container(
                          padding: const EdgeInsets.all(20),
                          decoration: BoxDecoration(
                            color: const Color(0xFF161616),
                            borderRadius: BorderRadius.circular(20),
                          ),
                          child: const Row(
                            mainAxisAlignment:
                                MainAxisAlignment.spaceBetween,
                            children: [
                              Column(
                                crossAxisAlignment:
                                    CrossAxisAlignment.start,
                                children: [
                                  Text(
                                    '⚡ Turbo Mode',
                                    style: TextStyle(
                                      fontSize: 20,
                                      fontWeight: FontWeight.bold,
                                    ),
                                  ),
                                  SizedBox(height: 6),
                                  Text(
                                    'USB High Speed Transfer',
                                    style: TextStyle(
                                      color: Colors.white54,
                                    ),
                                  ),
                                ],
                              ),
                              Icon(Icons.arrow_forward_ios),
                            ],
                          ),
                        ),

                        const SizedBox(height: 16),

                        Container(
                          padding: const EdgeInsets.all(20),
                          decoration: BoxDecoration(
                            color: const Color(0xFF161616),
                            borderRadius: BorderRadius.circular(20),
                          ),
                          child: const Row(
                            mainAxisAlignment:
                                MainAxisAlignment.spaceBetween,
                            children: [
                              Column(
                                crossAxisAlignment:
                                    CrossAxisAlignment.start,
                                children: [
                                  Text(
                                    '📶 Air Mode',
                                    style: TextStyle(
                                      fontSize: 20,
                                      fontWeight: FontWeight.bold,
                                    ),
                                  ),
                                  SizedBox(height: 6),
                                  Text(
                                    'Wi-Fi Direct Sharing',
                                    style: TextStyle(
                                      color: Colors.white54,
                                    ),
                                  ),
                                ],
                              ),
                              Icon(Icons.arrow_forward_ios),
                            ],
                          ),
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }

            Widget buildCard(String title, Color color) {
              return Container(
                decoration: BoxDecoration(
                  color: color.withOpacity(0.15),
                  borderRadius: BorderRadius.circular(24),
                  border: Border.all(
                    color: color.withOpacity(0.4),
                  ),
                ),
                child: Center(
                  child: Text(
                    title,
                    style: TextStyle(
                      color: color,
                      fontSize: 24,
                      fontWeight: FontWeight.bold,
                    ),
                  ),
                ),
              );
            }
          }
          EOF

      - name: Install Packages
        run: flutter pub get

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "TurboLink Initial Setup" || echo "No changes"

          git push
